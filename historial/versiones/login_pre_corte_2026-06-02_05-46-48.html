<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONY · POS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  background: #1a1a2e;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 16px;
  padding: 2.5rem;
  width: 100%;
  max-width: 400px;
}
.login-card h1 { font-size: 2rem; font-weight: 800; margin-bottom: .25rem; }
.login-card .sub { color: #aaa; font-size: .9rem; margin-bottom: 1.5rem; }
.form-control {
  background: #0f3460;
  border: 1px solid #1a1a2e;
  color: #fff;
}
.form-control:focus { background: #1a1a2e; border-color: #e94560; box-shadow: none; }
.btn-custom { background: #e94560; border: none; color: #fff; font-weight: 600; width: 100%; padding: .7rem; border-radius: 10px; }
.btn-custom:hover { background: #d63851; }
#loginError { color: #e94560; font-size: .85rem; margin-top: .5rem; text-align: center; display: none; }
</style>
</head>
<body>
<div class="login-card">
  <div style="text-align:center">
    <div style="font-size:2.5rem">🍔</div>
    <h1>CONY</h1>
    <div class="sub">Punto de venta</div>
  </div>
  <form id="loginForm" onsubmit="return doLogin(event)">
    <div class="mb-3">
      <label class="form-label">Usuario</label>
      <input type="text" id="u" class="form-control" placeholder="admin" autocomplete="username" autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" id="p" class="form-control" placeholder="••••" autocomplete="current-password">
    </div>
    <button type="submit" class="btn-custom">Entrar</button>
    <div id="loginError"></div>
  </form>
</div>
<script>
function doLogin(e){
  e.preventDefault();
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  const err = document.getElementById('loginError');
  if(!u || !p){ err.textContent='Completa todos los campos'; err.style.display='block'; return; }
  const cred = btoa(u+':'+p);
  // Intentar primero con el endpoint sin Basic (compatible Safari)
  fetch('/api/auth/login?user='+encodeURIComponent(u)+'&password='+encodeURIComponent(p))
    .then(r => {
      if(!r.ok) throw new Error('Credenciales inválidas');
      return r.json();
    })
    .then(data => {
      sessionStorage.setItem('auth', cred);
      sessionStorage.setItem('user', u);
      sessionStorage.setItem('nombreReal', (data.nombre_real||'')+' '+(data.apellidos||''));
      window.location.href='/dashboard';
    })
    .catch(e => {
      err.textContent = e.message || 'Error de conexión';
      err.style.display = 'block';
    });
}
</script>
</body>
</html>
