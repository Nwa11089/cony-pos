<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CONY - POS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter','Segoe UI',system-ui,sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:1rem}
.login-card{background:white;padding:2.5rem;border-radius:24px;width:100%;max-width:400px;box-shadow:0 30px 80px rgba(0,0,0,.25)}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,#e94560,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo p{color:#888;font-size:.9rem;margin-top:.2rem}
.logo .icon{font-size:3rem;display:block;margin-bottom:.5rem}
.form-group{margin-bottom:1.2rem}
.form-group label{color:#555;display:block;margin-bottom:.4rem;font-size:.85rem;font-weight:600}
.form-group input{width:100%;padding:.85rem 1rem;border:2px solid #e8e8e8;border-radius:12px;color:#333;font-size:1rem;transition:border .3s;background:#f9f9f9}
.form-group input:focus{outline:none;border-color:#667eea;background:white;box-shadow:0 0 0 4px rgba(102,126,234,.1)}
.btn-login{width:100%;padding:.9rem;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .3s}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,.4)}
.error{color:#e94560;font-size:.85rem;text-align:center;margin-top:.8rem;display:none;font-weight:600}
.credenciales{background:#f5f5f5;border-radius:12px;padding:1rem;margin-top:1.5rem;text-align:center;font-size:.8rem;color:#888;border:1px dashed #ddd}
.credenciales strong{color:#555}
</style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <span class="icon">🍔</span>
        <h1>CONY</h1>
        <p>Punto de Venta</p>
    </div>
    <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="username" placeholder="Tu usuario" autocomplete="username" autofocus>
    </div>
    <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()">
    </div>
    <button class="btn-login" onclick="login()">Entrar</button>
    <div class="error" id="errorMsg">Credenciales inválidas</div>
    <div class="credenciales">
        <strong>superuser</strong> / 1234 · <strong>admin_cony</strong> / 1234
    </div>
</div>
<script>
function login(){
    const u=document.getElementById('username').value.trim()
    const p=document.getElementById('password').value
    const err=document.getElementById('errorMsg')
    if(!u||!p){err.textContent='Completa todos los campos';err.style.display='block';return}
    const cred=btoa(u+':'+p)
    fetch('/api/usuarios',{headers:{'Authorization':'Basic '+cred}}).then(r=>{
        if(!r.ok)throw new Error('Credenciales inválidas')
        sessionStorage.setItem('auth',cred)
        sessionStorage.setItem('user',u)
        window.location.href='/dashboard'
    }).catch(e=>{
        err.textContent=e.message||'Error de conexión'
        err.style.display='block'
    })
}
</script>
</body>
</html>
