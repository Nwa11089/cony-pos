<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONY - POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background: #1a1a2e; color: #eee; font-family: Segoe UI, system-ui, sans-serif; }
    .navbar { background: #16213e !important; border-bottom: 2px solid #0f3460; }
    .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.2rem; }
    .nav-link { color: #a0a0b0 !important; font-weight: 500; }
    .nav-link:hover, .nav-link.active { color: #e94560 !important; }
    .card { background: #16213e; border: 1px solid #0f3460; border-radius: 12px; color: #eee; }
    .card .num { font-size: 1.8rem; font-weight: 800; color: #e94560; }
    .card .label { color: #888; font-size: 0.8rem; }
    .table { color: #ddd; margin: 0; }
    .table th { background: #0f3460; color: #e94560; border-color: #1a1a2e; }
    .table td { border-color: #1a1a3e; }
    .table-hover tbody tr:hover { background: #1a1a4e; color: #fff; }
    .btn-danger { background: #e94560; border: none; border-radius: 8px; }
    .btn-primary { background: #0f3460; border: none; border-radius: 8px; }
    .btn-primary:hover { background: #1a5276; }
    .modal-content { background: #16213e; border: 1px solid #0f3460; color: #eee; border-radius: 12px; }
    .modal-header { border-bottom: 1px solid #0f3460; }
    .modal-header .btn-close { filter: invert(1); }
    .form-control, .form-select { background: #1a1a2e; border: 1px solid #0f3460; color: #eee; border-radius: 8px; }
    .form-control:focus, .form-select:focus { background: #1a1a3e; border-color: #e94560; box-shadow: 0 0 0 2px rgba(233,69,96,.2); color: #eee; }
    .badge-pendiente { background: #f39c12; color: #000; }
    .badge-completado { background: #27ae60; color: #fff; }
    .badge-preparacion { background: #3498db; color: #fff; }
    .badge-cancelado { background: #e74c3c; color: #fff; }
    footer { text-align: center; padding: 1rem; color: #555; font-size: 0.8rem; }
    .tab-content { padding-top: 1rem; }

    .comandero-toolbar { display: flex; flex-wrap: wrap; gap: .75rem; margin-bottom: 1rem; }
    .cat-btn {
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #eee;
      border-radius: 999px;
      padding: .85rem 1rem;
      font-weight: 700;
      min-height: 52px;
    }
    .cat-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
    .comandero-layout { display: grid; grid-template-columns: minmax(0,1fr) 360px; gap: 1rem; align-items: start; }
    .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 1rem; }
    .producto-btn {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      color: #fff;
      min-height: 160px;
      padding: 1rem;
      text-align: left;
      transition: .15s ease;
      width: 100%;
    }
    .producto-btn:hover { border-color: #e94560; transform: translateY(-2px); }
    .producto-emoji { font-size: 2rem; line-height: 1; margin-bottom: .5rem; }
    .producto-nombre { font-weight: 800; font-size: 1rem; line-height: 1.2; }
    .producto-precio { margin-top: .75rem; color: #ffb8c4; font-weight: 700; }
    .carrito-panel { position: sticky; top: 1rem; }
    .carrito-item { background: #1a1a2e; border: 1px solid #0f3460; border-radius: 14px; padding: .85rem; margin-bottom: .75rem; }
    .carrito-top { display: flex; justify-content: space-between; gap: .75rem; }
    .carrito-nombre { font-weight: 700; }
    .carrito-sub { color: #999; font-size: .85rem; }
    .qty-wrap { display: flex; align-items: center; gap: .5rem; margin-top: .75rem; }
    .qty-btn {
      width: 40px; height: 40px; border-radius: 10px; border: 1px solid #0f3460;
      background: #16213e; color: #fff; font-size: 1.1rem; font-weight: 700;
    }
    .qty-num { min-width: 28px; text-align: center; font-weight: 800; }
    .carrito-total { border-top: 1px solid #0f3460; padding-top: 1rem; margin-top: 1rem; }
    .carrito-total-row { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 800; margin-bottom: 1rem; }
    .placeholder-empty { color: #888; text-align: center; padding: 1rem; border: 1px dashed #0f3460; border-radius: 12px; }

    @media (max-width: 992px) {
      .comandero-layout { grid-template-columns: 1fr; }
      .carrito-panel { position: static; }
    }
    @media (max-width: 576px) {
      .productos-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .cat-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-3">
      <span class="navbar-brand"><i class="bi bi-shop"></i> CONY</span>
      <div class="d-flex align-items-center gap-3">
        <span style="color:#888;font-size:.8rem"><i class="bi bi-person-circle"></i> <span id="navUser"></span></span>
        <button class="btn btn-danger btn-sm" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>

  <ul class="nav nav-tabs px-3 pt-2" style="border-bottom-color:#0f3460" id="mainTabs">
    <li class="nav-item"><button class="nav-link active" onclick="showTab('comandero',this)"><i class="bi bi-grid"></i> Comandero</button></li>
    <li class="nav-item"><button class="nav-link" onclick="showTab('dashboard',this)"><i class="bi bi-speedometer2"></i> Dashboard</button></li>
    <li class="nav-item"><button class="nav-link" onclick="showTab('productos',this)"><i class="bi bi-box-seam"></i> Productos</button></li>
    <li class="nav-item"><button class="nav-link" onclick="showTab('pedidos',this)"><i class="bi bi-receipt"></i> Pedidos</button></li>
    <li class="nav-item"><button class="nav-link" onclick="showTab('reportes',this)"><i class="bi bi-graph-up"></i> Reportes</button></li>
    <li class="nav-item" id="usersTabLi" style="display:none"><button class="nav-link" onclick="showTab('usuarios',this)"><i class="bi bi-people"></i> Usuarios</button></li>
  </ul>

  <div class="container-fluid px-3 tab-content">
    <div class="tab-pane active show" id="tab-comandero">
      <div class="comandero-layout">
        <div>
          <div class="card p-3 mb-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
              <h6 style="color:#e94560;margin:0"><i class="bi bi-grid"></i> Comandero</h6>
              <div style="color:#888;font-size:.85rem" id="comCount">0 productos</div>
            </div>
            <div class="comandero-toolbar" id="catFilters"></div>
            <div id="comProductos" class="productos-grid">Cargando...</div>
          </div>
        </div>
        <div class="card p-3 carrito-panel">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 style="color:#e94560;margin:0"><i class="bi bi-cart3"></i> Pedido actual</h6>
            <button class="btn btn-outline-light btn-sm" onclick="clearCart()">Limpiar</button>
          </div>
          <div id="carritoList"></div>
          <div class="carrito-total">
            <div class="carrito-total-row">
              <span>Total</span>
              <span id="carritoTotal">$0.00</span>
            </div>
            <div class="d-grid gap-2">
              <button class="btn btn-danger" onclick="confirmarPedido()">Confirmar</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-pane" id="tab-dashboard">
      <div class="row g-3 mb-3">
        <div class="col-md-3"><div class="card p-3"><div class="num" id="dashVentas">$0</div><div class="label">Ventas hoy</div></div></div>
        <div class="col-md-3"><div class="card p-3"><div class="num" id="dashPedidos">0</div><div class="label">Pedidos hoy</div></div></div>
        <div class="col-md-3"><div class="card p-3"><div class="num" id="dashProductos">0</div><div class="label">Productos</div></div></div>
        <div class="col-md-3"><div class="card p-3"><div class="num" id="dashPendientes">0</div><div class="label">Pendientes</div></div></div>
      </div>
      <div class="card p-3"><h6 style="color:#e94560"><i class="bi bi-clock-history"></i> Últimos pedidos</h6><div id="dashRecent">Cargando...</div></div>
    </div>

    <div class="tab-pane" id="tab-productos">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 style="color:#e94560;margin:0"><i class="bi bi-box-seam"></i> Catálogo</h6>
        <button class="btn btn-primary btn-sm" onclick="openProdModal()">+ Nuevo</button>
      </div>
      <div class="card p-3"><div id="prodTable">Cargando...</div></div>
    </div>

    <div class="tab-pane" id="tab-pedidos">
      <h6 style="color:#e94560;margin-bottom:.5rem"><i class="bi bi-receipt"></i> Historial</h6>
      <div class="card p-3"><div id="pedidosTable">Cargando...</div></div>
    </div>

    <div class="tab-pane" id="tab-reportes">
      <h6 style="color:#e94560;margin-bottom:.5rem"><i class="bi bi-graph-up"></i> Reporte por fechas</h6>
      <div class="row g-2 mb-2">
        <div class="col-auto"><input type="date" id="rDesde" class="form-control form-control-sm" style="width:150px"></div>
        <div class="col-auto"><input type="date" id="rHasta" class="form-control form-control-sm" style="width:150px"></div>
        <div class="col-auto"><button class="btn btn-primary btn-sm" onclick="loadReporte()">Ver</button></div>
      </div>
      <div class="card p-3"><div id="reporteResult">Selecciona fechas</div></div>
    </div>

    <div class="tab-pane" id="tab-usuarios">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 style="color:#e94560;margin:0"><i class="bi bi-people"></i> Usuarios</h6>
        <button class="btn btn-primary btn-sm" onclick="openUserModal()">+ Nuevo</button>
      </div>
      <div class="card p-3"><div id="usersTable">Cargando...</div></div>
    </div>
  </div>

  <div class="modal fade" id="prodModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="prodModalTitle">Nuevo producto</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="pId">
      <div class="mb-2"><label class="form-label">Nombre</label><input type="text" id="pNombre" class="form-control" placeholder="Hot dog"></div>
      <div class="mb-2"><label class="form-label">Categoría</label>
        <select id="pCategoria" class="form-select">
          <option>Hot dogs</option><option>Hot dogs especiales</option><option>Hamburguesas</option>
          <option>Alitas</option><option>Aperitivos</option><option>Extras</option>
        </select>
      </div>
      <div class="mb-2"><label class="form-label">Precio $</label><input type="number" id="pPrecio" step="0.5" class="form-control" placeholder="0"></div>
      <div class="mb-2"><label class="form-label">Descripción</label><textarea id="pDescripcion" class="form-control" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
      <button class="btn btn-danger btn-sm" onclick="saveProducto()">Guardar</button>
    </div>
  </div></div></div>

  <div class="modal fade" id="userModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Nuevo usuario</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="mb-2"><label class="form-label">Nombre</label><input type="text" id="uNombre" class="form-control" placeholder="admin_cony"></div>
      <div class="mb-2"><label class="form-label">Contraseña</label><input type="text" id="uPassword" class="form-control" placeholder="Mínimo 4"></div>
      <div class="mb-2"><label class="form-label">Rol</label>
        <select id="uRol" class="form-select">
          <option value="user">User (empleado)</option>
          <option value="admin">Admin (dueño CONY)</option>
          <option value="superuser">Superuser (Neto)</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
      <button class="btn btn-danger btn-sm" onclick="saveUsuario()">Crear</button>
    </div>
  </div></div></div>

  <footer>CONY POS &copy; 2026</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const A = sessionStorage.getItem('auth');
    const U = sessionStorage.getItem('user');
    let comanderoProductos = [];
    let comanderoCategoria = 'all';
    let carrito = [];
    const categoriasComandero = [
      { key: 'all', label: '✨ Todos' },
      { key: 'Hot dogs', label: '🌭 Hot dogs' },
      { key: 'Especiales', label: '⭐ Especiales' },
      { key: 'Hamburguesas', label: '🍔 Hamburguesas' },
      { key: 'Alitas', label: '🍗 Alitas' },
      { key: 'Aperitivos', label: '🥟 Aperitivos' },
      { key: 'Extras', label: '➕ Extras' }
    ];

    function logout(){ sessionStorage.clear(); window.location.href='/'; }

    function api(p,o={}) {
      o.headers = o.headers || {};
      o.headers['Authorization'] = 'Basic ' + A;
      return fetch(p,o).then(r => {
        if(r.status === 401){ logout(); throw new Error('401'); }
        if(!r.ok) return r.json().then(e => { throw new Error(e.detail || 'Err'); }).catch(() => { throw new Error('Err'); });
        return r.json();
      });
    }

    function showTab(name,btn){
      document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active','show'));
      document.querySelectorAll('.nav-link').forEach(b=>b.classList.remove('active'));
      document.getElementById('tab-'+name).classList.add('active','show');
      if(btn) btn.classList.add('active');
      if(name==='dashboard') loadDashboard();
      if(name==='productos') loadProductos();
      if(name==='pedidos') loadPedidos();
      if(name==='reportes'){}
      if(name==='usuarios') loadUsuarios();
      if(name==='comandero') loadComandero();
    }

    function formatMoney(n){ return '$' + Number(n || 0).toFixed(2); }
    function esc(s=''){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

    function loadDashboard(){
      api('/api/reportes/ventas-hoy').then(d => {
        document.getElementById('dashVentas').textContent = '$' + d.total_ventas.toFixed(2);
        document.getElementById('dashPedidos').textContent = d.total_pedidos;
      });
      api('/api/productos').then(p => document.getElementById('dashProductos').textContent = p.filter(x=>x.disponible).length);
      api('/api/pedidos').then(p => {
        document.getElementById('dashPendientes').textContent = p.filter(x=>x.estatus==='pendiente').length;
        let r = p.slice(0,5);
        if(!r.length){ document.getElementById('dashRecent').innerHTML = '<div class="text-muted">Sin pedidos</div>'; return; }
        let h = '<table class="table table-hover"><thead><tr><th>Folio</th><th>Cliente</th><th>Total</th><th>Estado</th></tr></thead><tbody>';
        r.forEach(x => {
          let badge = x.estatus==='pendiente' ? 'badge-pendiente' : x.estatus==='completado' ? 'badge-completado' : x.estatus==='en-preparacion' ? 'badge-preparacion' : x.estatus==='cancelado' ? 'badge-cancelado' : 'badge-pendiente';
          h += `<tr><td>${x.folio||'-'}</td><td>${x.cliente_nombre||'Mostrador'}</td><td>$${(x.total||0).toFixed(2)}</td><td><span class="badge ${badge}">${x.estatus||'pendiente'}</span></td></tr>`;
        });
        h += '</tbody></table>';
        document.getElementById('dashRecent').innerHTML = h;
      });
    }

    function loadProductos(){
      api('/api/productos').then(p => {
        if(!p.length){ document.getElementById('prodTable').innerHTML = '<div class="text-muted">Sin productos</div>'; return; }
        let h = '<table class="table table-hover"><thead><tr><th>ID</th><th>Nombre</th><th>Categoría</th><th>$</th><th>Disp.</th><th></th></tr></thead><tbody>';
        p.forEach(x => {
          h += `<tr><td>${x.id}</td><td>${x.nombre}</td><td>${x.categoria}</td><td>${x.precio.toFixed(2)}</td><td>${x.disponible?'Sí':'No'}</td><td>`+
               `<button class="btn btn-primary btn-sm" onclick="editProd(${x.id},'${(x.nombre||'').replace(/'/g,"\\'")}','${(x.categoria||'').replace(/'/g,"\\'")}',${x.precio},'${(x.descripcion||'').replace(/'/g,"\\'")}')"><i class="bi bi-pencil"></i></button> `+
               `<button class="btn btn-danger btn-sm" onclick="if(confirm('Eliminar?')) delProd(${x.id})"><i class="bi bi-trash"></i></button>`+
               `</td></tr>`;
        });
        h += '</tbody></table>';
        document.getElementById('prodTable').innerHTML = h;
      });
    }

    function openProdModal(){
      document.getElementById('prodModalTitle').textContent = 'Nuevo producto';
      document.getElementById('pId').value='';
      document.getElementById('pNombre').value='';
      document.getElementById('pPrecio').value='';
      document.getElementById('pDescripcion').value='';
      new bootstrap.Modal(document.getElementById('prodModal')).show();
    }

    function editProd(id,n,c,p,d){
      document.getElementById('prodModalTitle').textContent = 'Editar producto';
      document.getElementById('pId').value=id;
      document.getElementById('pNombre').value=n;
      document.getElementById('pCategoria').value=c;
      document.getElementById('pPrecio').value=p;
      document.getElementById('pDescripcion').value=d;
      new bootstrap.Modal(document.getElementById('prodModal')).show();
    }

    function saveProducto(){
      const id = document.getElementById('pId').value;
      const data = {
        nombre: document.getElementById('pNombre').value,
        categoria: document.getElementById('pCategoria').value,
        precio: parseFloat(document.getElementById('pPrecio').value||0),
        descripcion: document.getElementById('pDescripcion').value,
        disponible: 1
      };
      if(!data.nombre || !data.precio){ alert('Completa nombre y precio'); return; }
      const m = id ? 'PUT' : 'POST';
      const url = id ? `/api/productos/${id}` : '/api/productos';
      api(url,{method:m,body:JSON.stringify(data),headers:{'Content-Type':'application/json'}}).then(()=>{ bootstrap.Modal.getInstance(document.getElementById('prodModal')).hide(); loadProductos(); loadComandero(); });
    }

    function delProd(id){ api(`/api/productos/${id}`,{method:'DELETE'}).then(()=>{ loadProductos(); loadComandero(); }); }

    function loadPedidos(){
      api('/api/pedidos').then(p => {
        if(!p.length){ document.getElementById('pedidosTable').innerHTML = '<div class="text-muted">Sin pedidos</div>'; return; }
        let h = '<table class="table table-hover"><thead><tr><th>Folio</th><th>Cliente</th><th>Tel</th><th>Total</th><th>Estado</th><th>Pago</th><th>Fecha</th><th></th></tr></thead><tbody>';
        p.forEach(x => {
          let badge = x.estatus==='pendiente' ? 'badge-pendiente' : x.estatus==='completado' ? 'badge-completado' : x.estatus==='en-preparacion' ? 'badge-preparacion' : x.estatus==='cancelado' ? 'badge-cancelado' : 'badge-pendiente';
          h += `<tr><td>${x.folio||'-'}</td><td>${x.cliente_nombre||'-'}</td><td>${x.telefono||'-'}</td><td>$${(x.total||0).toFixed(2)}</td>`+
               `<td><span class="badge ${badge}">${x.estatus||'pendiente'}</span></td><td>${x.metodo_pago||'-'}</td><td style="font-size:.75rem">${x.fecha?new Date(x.fecha).toLocaleString():'-'}</td>`+
               `<td><select class="form-select form-select-sm" style="width:120px" onchange="cambiarEst(${x.id},this.value)">`+
               `<option value="pendiente" ${x.estatus==='pendiente'?'selected':''}>Pendiente</option>`+
               `<option value="en-preparacion" ${x.estatus==='en-preparacion'?'selected':''}>Cocina</option>`+
               `<option value="completado" ${x.estatus==='completado'?'selected':''}>Listo</option>`+
               `<option value="cancelado" ${x.estatus==='cancelado'?'selected':''}>Cancelar</option>`+
               `</select></td></tr>`;
        });
        h += '</tbody></table>';
        document.getElementById('pedidosTable').innerHTML = h;
      });
    }

    function cambiarEst(id,e){ api(`/api/pedidos/${id}/estatus`,{method:'PUT',body:JSON.stringify({estatus:e}),headers:{'Content-Type':'application/json'}}).then(loadPedidos); }

    function loadReporte(){
      const d = document.getElementById('rDesde').value, h = document.getElementById('rHasta').value;
      if(!d || !h){ alert('Selecciona fechas'); return; }
      api(`/api/reportes/ventas-rango?desde=${d}&hasta=${h}`).then(data => {
        if(!data.length){ document.getElementById('reporteResult').innerHTML = '<div class="text-muted">Sin datos</div>'; return; }
        let htm = '<table class="table table-hover"><thead><tr><th>Día</th><th>Pedidos</th><th>Total</th></tr></thead><tbody>';
        data.forEach(r => htm += `<tr><td>${r.dia}</td><td>${r.pedidos}</td><td>$${r.total.toFixed(2)}</td></tr>`);
        htm += `<tr style="background:#0f3460;font-weight:bold"><td>TOTAL</td><td>${data.reduce((s,r)=>s+r.pedidos,0)}</td><td>$${data.reduce((s,r)=>s+r.total,0).toFixed(2)}</td></tr></tbody></table>`;
        document.getElementById('reporteResult').innerHTML = htm;
      });
    }

    function loadUsuarios(){
      api('/api/usuarios').then(u => {
        document.getElementById('usersTabLi').style.display='list-item';
        let h = '<table class="table table-hover"><thead><tr><th>ID</th><th>Nombre</th><th>Rol</th><th>Proyecto</th><th>Activo</th></tr></thead><tbody>';
        u.forEach(x => h += `<tr><td>${x.id}</td><td>${x.nombre}</td><td>${x.rol}</td><td>${x.proyecto||'-'}</td><td>${x.activo?'Sí':'No'}</td></tr>`);
        h += '</tbody></table>';
        document.getElementById('usersTable').innerHTML = h;
      }).catch(()=>document.getElementById('usersTabLi').style.display='none');
    }

    function openUserModal(){ new bootstrap.Modal(document.getElementById('userModal')).show(); }

    function saveUsuario(){
      const data = {nombre:document.getElementById('uNombre').value,password:document.getElementById('uPassword').value,rol:document.getElementById('uRol').value};
      if(!data.nombre || !data.password){ alert('Completa datos'); return; }
      api('/api/usuarios',{method:'POST',body:JSON.stringify(data),headers:{'Content-Type':'application/json'}}).then(()=>{ bootstrap.Modal.getInstance(document.getElementById('userModal')).hide(); loadUsuarios(); });
    }

    function loadComandero(){
      api('/api/productos').then(p => {
        comanderoProductos = p.filter(x => x.disponible);
        renderCategoriasComandero();
        renderProductosComandero();
      });
    }

    function renderCategoriasComandero(){
      const el = document.getElementById('catFilters');
      el.innerHTML = categoriasComandero.map(c => `<button class="cat-btn ${comanderoCategoria===c.key?'active':''}" onclick="setCategoria('${c.key.replace(/'/g,"\\'")}')">${c.label}</button>`).join('');
    }

    function setCategoria(cat){ comanderoCategoria = cat; renderCategoriasComandero(); renderProductosComandero(); }

    function renderProductosComandero(){
      const list = comanderoProductos.filter(x => comanderoCategoria==='all' || x.categoria===comanderoCategoria);
      document.getElementById('comCount').textContent = `${list.length} productos`;
      if(!list.length){ document.getElementById('comProductos').innerHTML = '<div class="placeholder-empty" style="grid-column:1/-1">No hay productos en esta categoría</div>'; return; }
      document.getElementById('comProductos').innerHTML = list.map(x => `
        <button class="producto-btn" onclick="agregarCarrito(${x.id})">
          <div class="producto-emoji">${esc(x.emoji || emojiPorCategoria(x.categoria))}</div>
          <div class="producto-nombre">${esc(x.nombre)}</div>
          <div class="producto-precio">${formatMoney(x.precio)}</div>
        </button>
      `).join('');
    }

    function emojiPorCategoria(cat){
      if(cat==='Hot dogs') return '🌭';
      if(cat==='Especiales') return '⭐';
      if(cat==='Hamburguesas') return '🍔';
      if(cat==='Alitas') return '🍗';
      if(cat==='Aperitivos') return '🥟';
      if(cat==='Extras') return '➕';
      return '🍽️';
    }

    function agregarCarrito(id){
      const p = comanderoProductos.find(x => x.id === id);
      if(!p) return;
      const found = carrito.find(x => x.id === id);
      if(found) found.q += 1;
      else carrito.push({ id:p.id, n:p.nombre, p:Number(p.precio), q:1 });
      renderCarrito();
    }

    function cambiarCantidad(id,delta){
      const it = carrito.find(x => x.id === id);
      if(!it) return;
      it.q += delta;
      if(it.q <= 0) carrito = carrito.filter(x => x.id !== id);
      renderCarrito();
    }

    function quitarItem(id){ carrito = carrito.filter(x => x.id !== id); renderCarrito(); }
    function clearCart(){ carrito = []; renderCarrito(); }
    function totalCarrito(){ return carrito.reduce((s,x)=>s + x.p * x.q, 0); }

    function renderCarrito(){
      const el = document.getElementById('carritoList');
      if(!carrito.length) el.innerHTML = '<div class="placeholder-empty">Todavía no agregas productos</div>';
      else el.innerHTML = carrito.map(x => `
        <div class="carrito-item">
          <div class="carrito-top">
            <div>
              <div class="carrito-nombre">${esc(x.n)}</div>
              <div class="carrito-sub">${formatMoney(x.p)} c/u · ${formatMoney(x.p * x.q)}</div>
            </div>
            <button class="btn btn-outline-danger btn-sm" onclick="quitarItem(${x.id})">✕</button>
          </div>
          <div class="qty-wrap">
            <button class="qty-btn" onclick="cambiarCantidad(${x.id},-1)">−</button>
            <div class="qty-num">${x.q}</div>
            <button class="qty-btn" onclick="cambiarCantidad(${x.id},1)">+</button>
          </div>
        </div>
      `).join('');
      document.getElementById('carritoTotal').textContent = formatMoney(totalCarrito());
    }

    function confirmarPedido(){
      if(!carrito.length){ alert('Agrega productos al pedido'); return; }
      const nombre = prompt('Nombre del cliente o referencia:','Mostrador');
      if(nombre===null) return;
      const direccion = prompt('Dirección o referencia:','Mostrador');
      if(direccion===null) return;
      const metodo_pago = prompt('Método de pago (Efectivo/Tarjeta/Transferencia):','Efectivo');
      if(metodo_pago===null) return;
      const telefono = '0000000000';
      const nota = carrito.map(x => `${x.q}x ${x.n}`).join(', ');
      const payload = {
        token: 'mi_token_secreto_123',
        telefono: '0000000000',
        nombre: nombre.trim() || 'Mostrador',
        metodo_entrega: 'recoger',
        metodo_pago: metodo_pago.trim() || 'Efectivo',
        nota,
        total: Number(totalCarrito().toFixed(2)),
        productos: JSON.stringify(carrito.map(x => ({ id:x.id, n:x.n, p:x.p, q:x.q })))
      };
      fetch('/api/comandar_directo', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':'Basic '+A() },
        body: JSON.stringify(payload)
      }).then(r => r.json()).then(d => {
        alert('✅ Pedido confirmado · Folio: ' + (d.folio || 'OK'));
        clearCart();
        loadDashboard();
      }).catch(e => {
        alert('⚠️ Error. El pedido no pudo procesarse.');
      });
    }

    document.getElementById('navUser').textContent = U;
    loadComandero();
    loadDashboard();
    loadUsuarios();
    renderCarrito();
  </script>
</body>
</html>
